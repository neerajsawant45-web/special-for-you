<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cat Love Website</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#000;
    }

    .container{
      position:relative;
      width:100%;
      height:100vh;
    }

    .bg-image{
      position:absolute;
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(60%);
    }

    .overlay{
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.2);
    }

    .content{
      position:relative;
      z-index:2;
      color:white;
      text-align:center;
      top:50%;
      transform:translateY(-50%);
      padding:20px;
    }

    h1{
      font-size:60px;
      margin-bottom:20px;
      text-shadow:0 0 20px red;
    }

    p{
      font-size:22px;
      margin-bottom:30px;
    }

    button{
      padding:15px 35px;
      border:none;
      border-radius:40px;
      background:red;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:white;
      color:red;
      transform:scale(1.1);
    }

    audio{
      display:none;
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- SAME IMAGE -->
    <img src="cat.jpg" class="bg-image">

    <div class="overlay"></div>

    <div class="content">
      <h1>Cute Cat ❤️</h1>
      <p>Flowers + Music + Love Vibes 🌸</p>

      <button onclick="playMusic()">Play Song 🎵</button>
    </div>

  </div>

  <!-- SONG -->
  <audio id="song" loop>
    <source src="song.mp3" type="audio/mp3">
  </audio>

  <script>
    function playMusic(){
      document.getElementById("song").play();
    }
  </script>

</body>
</html>
